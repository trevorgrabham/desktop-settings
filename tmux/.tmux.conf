# sets <Space> as the 'prefix' key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# uses vim navigations for panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# rebind pain resizing for vim navi
bind C-h resize-pane -L 5
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 5

# rebind window splits
bind h split-window -h
bind v split-window -v

# use vim navi controls in copy mode
setw -g mode-keys vi

# set up vim visual, yank, paste
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind p run-shell "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"
bind P paste-buffer

set -g set-clipboard on

# set default term 
set-option -g default-terminal "screen-256color"

# pause live tasktimer sessions when the server shuts down
set-hook -g session-closed "run-shell '/home/trevorgrabham/bin/pause-tasktimer-sessions.sh'"
